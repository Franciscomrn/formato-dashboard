<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rastreio de Frota - Formato</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:"Segoe UI",sans-serif;background:#0f172a;color:#e2e8f0;height:100vh;display:flex;flex-direction:column;}
    .hdr{background:linear-gradient(135deg,#1e3a5f,#1e293b);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
    .hdr h1{font-size:1.1rem;font-weight:700;color:#60a5fa;}
    .hdr a{color:#94a3b8;font-size:0.8rem;text-decoration:none;padding:4px 10px;border:1px solid #334155;border-radius:6px;}
    .toolbar{background:#1e293b;padding:10px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;border-bottom:1px solid #334155;}
    .pill{display:inline-flex;align-items:center;gap:5px;background:#0f172a;border:1px solid #334155;border-radius:20px;padding:4px 12px;cursor:pointer;font-size:0.8rem;color:#94a3b8;}
    .pill:hover{border-color:#3b82f6;color:#60a5fa;background:#1e3a5f;}
    .pill.moving{border-color:#22c55e;color:#4ade80;}
    .pill.stopped{border-color:#ef4444;color:#f87171;}
    .pill.selected{background:#1e3a5f;border-color:#3b82f6;color:#60a5fa;font-weight:600;}
    .mode-btn{padding:5px 14px;border:1px solid #334155;border-radius:6px;background:#0f172a;color:#94a3b8;cursor:pointer;font-size:0.8rem;}
    .mode-btn.active{background:#1e3a5f;border-color:#3b82f6;color:#60a5fa;}
    .hist-controls{display:none;align-items:center;gap:8px;margin-left:auto;flex-wrap:wrap;}
    .hist-controls.show{display:flex;}
    .hist-controls label{font-size:0.8rem;color:#94a3b8;}
    .hist-controls input[type=date]{background:#0f172a;border:1px solid #334155;border-radius:6px;color:#e2e8f0;padding:4px 8px;font-size:0.8rem;}
    .hist-controls button{padding:5px 14px;border:1px solid #3b82f6;border-radius:6px;background:#1e3a5f;color:#60a5fa;cursor:pointer;font-size:0.8rem;}
    .hist-controls button.danger{border-color:#ef4444;color:#f87171;background:#1e0a0a;}
    #map{flex:1;}
    .status-bar{background:#1e293b;padding:6px 20px;font-size:0.75rem;color:#64748b;display:flex;gap:16px;flex-wrap:wrap;align-items:center;border-top:1px solid #334155;}
    .loading-overlay{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#1e293b;border:1px solid #334155;border-radius:12px;padding:24px 40px;z-index:1000;text-align:center;color:#60a5fa;}
    .loading-overlay.show{display:block;}
    .spinner{border:3px solid #334155;border-top:3px solid #3b82f6;border-radius:50%;width:30px;height:30px;animation:spin 0.8s linear infinite;margin:0 auto 12px;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .hist-info{display:none;background:#1e293b;padding:8px 20px;font-size:0.8rem;color:#94a3b8;border-top:1px solid #334155;align-items:center;gap:16px;flex-wrap:wrap;}
    .hist-info.show{display:flex;}
    .legend{display:flex;align-items:center;gap:6px;}
    .dot{width:10px;height:10px;border-radius:50%;display:inline-block;}
    .warn-bar{background:#1c1a05;border-bottom:1px solid #78716c;padding:8px 20px;font-size:0.8rem;color:#a8a29e;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
    .warn-bar a{color:#f59e0b;text-decoration:underline;cursor:pointer;}
  </style>
</head>
<body>
<div class="hdr">
  <h1>Rastreio de Frota - Formato</h1>
  <a href="index.html">Voltar ao Dashboard</a>
</div>
<div class="warn-bar" id="warn-bar" style="display:none;">
  Para ver posicoes ao vivo e historico, <a onclick="connectFulltrack()">clique aqui para conectar ao Fulltrack</a> (1x por sessao).
</div>
<div class="toolbar">
  <button class="mode-btn active" id="btn-live" onclick="setMode('live')">Tempo Real</button>
  <button class="mode-btn" id="btn-hist" onclick="setMode('hist')">Historico de Rota</button>
  <div id="vehicle-pills"></div>
  <div class="hist-controls" id="hist-controls">
    <label>Veiculo:</label>
    <span id="hist-vehicle-name" style="color:#60a5fa;font-size:0.85rem;font-weight:600;">-</span>
    <label>Data:</label>
    <input type="date" id="hist-date">
    <button onclick="loadHistory()">Ver Rota</button>
    <button class="danger" onclick="clearHistory()">Limpar</button>
  </div>
</div>
<div class="hist-info" id="hist-info">
  <div class="legend"><div class="dot" style="background:#22c55e;"></div><span>Inicio</span></div>
  <div class="legend"><div class="dot" style="background:#ef4444;"></div><span>Fim</span></div>
  <div class="legend"><div class="dot" style="width:28px;height:4px;border-radius:2px;background:#3b82f6;"></div><span>Rota percorrida</span></div>
  <span id="hist-stats" style="margin-left:auto;"></span>
</div>
<div style="position:relative;flex:1;display:flex;flex-direction:column;">
  <div id="map"></div>
  <div class="loading-overlay" id="loading"><div class="spinner"></div>Carregando...</div>
</div>
<div class="status-bar">
  <span id="status-time">Carregando...</span>
  <span id="status-mode">Modo: Tempo Real</span>
</div>
<script>
var VEHICLES=[{id:1407930,name:'SAVEIRO 1',plate:'QSS4B37',color:'#f59e0b'},{id:1407929,name:'UNO',plate:'ENM7C89',color:'#22c55e'},{id:1347013,name:'Opala',plate:'Opala',color:'#a855f7'},{id:945466,name:'VAN',plate:'FORMATO',color:'#ef4444'}];
var CLIENT_ID='296743';
var API_HIST='https://api-fulltrack4.fulltrackapp.com/relatorio/HistoricoPosicao/gerar/';
var API_POS='https://mapageral.ops.fulltrackapp.com/maps/v2/last-positions/';
var FT_BASE='https://vitoria-acessorios.fulltrackapp.com';
var RETURN_URL='https://franciscomrn.github.io/formato-dashboard/rastreio.html';
var TOK_KEY='rastreio-ftk';
var TOK_EXP='rastreio-ftk-exp';
var map=L.map('map').setView([-21.546,-49.856],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'OpenStreetMap'}).addTo(map);
var markers={},histLayer=null,mode='live',refreshTimer=null,selectedVehicle=null;

function getToken(){
  var hash=window.location.hash||'';
  if(hash.indexOf('tok=')>=0){
    var tok=decodeURIComponent(hash.split('tok=')[1].split('&')[0]);
    if(tok&&tok.length>10){
      localStorage.setItem(TOK_KEY,tok);
      localStorage.setItem(TOK_EXP,String(Date.now()+55*60*1000));
      history.replaceState(null,'',location.pathname+location.search);
      return tok;
    }
  }
  var t=localStorage.getItem(TOK_KEY);
  var e=parseInt(localStorage.getItem(TOK_EXP)||'0');
  if(t&&Date.now()<e)return t;
  return null;
}

function connectFulltrack(){
  var url=FT_BASE+'/mapaGeral_v3/';
  window.location.href=url;
}

function makeIcon(color,label){
  var s='<svg xmlns="http://www.w3.org/2000/svg" width="34" height="44" viewBox="0 0 34 44"><path d="M17 2C9.82 2 4 7.82 4 15c0 10 13 27 13 27s13-17 13-27C30 7.82 24.18 2 17 2z" fill="'+color+'" stroke="#fff" stroke-width="2"/><text x="17" y="19" text-anchor="middle" fill="#fff" font-size="9" font-family="Arial" font-weight="bold">'+label+'</text></svg>';
  return L.divIcon({html:s,iconSize:[34,44],iconAnchor:[17,44],popupAnchor:[0,-44],className:''});
}

function fetchPositions(token,cb){
  var xhr=new XMLHttpRequest();
  xhr.open('GET',API_POS,true);
  xhr.setRequestHeader('Authorization','Bearer '+token);
  xhr.onload=function(){if(xhr.status===200){try{cb(JSON.parse(xhr.responseText));}catch(e){cb(null,xhr.status);}}else{cb(null,xhr.status);}};
  xhr.onerror=function(){cb(null,0);};
  xhr.send();
}

function updateLiveMarkers(data){
  var ids=VEHICLES.map(function(v){return v.id;});
  data.filter(function(d){return ids.indexOf(d.ativo_id)>=0;}).forEach(function(d){
    var veh=VEHICLES.filter(function(v){return v.id===d.ativo_id;})[0];
    if(!veh)return;
    var icon=makeIcon(veh.color,veh.name.split(' ')[0].substring(0,5));
    var spd=d.speed?d.speed.val+' km/h':'0 km/h';
    var ign=d.ignition?'Ligada':'Desligada';
    var popup='<b style="color:'+veh.color+'">'+veh.name+'</b><br>Placa: '+veh.plate+'<br>Vel: '+spd+'<br>Ignicao: '+ign+'<br><small>No modo Historico, clique para ver rota</small>';
    if(markers[veh.id]){markers[veh.id].setLatLng([d.lat_lng[0],d.lat_lng[1]]).setPopupContent(popup);}
    else{
      markers[veh.id]=L.marker([d.lat_lng[0],d.lat_lng[1]],{icon:icon}).addTo(map).bindPopup(popup);
      markers[veh.id].on('click',(function(v){return function(){if(mode==='hist')selectVehicleForHistory(v);};})(veh));
    }
  });
}

function updatePills(data){
  var c=document.getElementById('vehicle-pills');c.innerHTML='';
  VEHICLES.forEach(function(veh){
    var live=data?data.filter(function(d){return d.ativo_id===veh.id;})[0]:null;
    var cls='pill'+(live?(live.ignition?' moving':' stopped'):'')+(selectedVehicle&&selectedVehicle.id===veh.id?' selected':'');
    var p=document.createElement('button');p.className=cls;
    p.innerHTML='<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:'+veh.color+';"></span> '+veh.name;
    p.onclick=(function(v){return function(){if(mode==='hist')selectVehicleForHistory(v);else if(markers[v.id]){map.setView(markers[v.id].getLatLng(),16);markers[v.id].openPopup();}};})(veh);
    c.appendChild(p);
  });
}

function liveRefresh(){
  var token=getToken();
  if(!token){document.getElementById('warn-bar').style.display='flex';updatePills(null);document.getElementById('status-time').textContent='Sem conexao - clique na barra amarela';return;}
  document.getElementById('warn-bar').style.display='none';
  fetchPositions(token,function(data,status){
    if(!data){
      if(status===401||status===403){localStorage.removeItem(TOK_KEY);document.getElementById('warn-bar').style.display='flex';}
      document.getElementById('status-time').textContent='Erro ao buscar posicoes ('+status+')';
      updatePills(null);return;
    }
    updateLiveMarkers(data);
    var t=new Date();
    document.getElementById('status-time').textContent='Atualizado: '+t.getHours().toString().padStart(2,'0')+':'+t.getMinutes().toString().padStart(2,'0')+':'+t.getSeconds().toString().padStart(2,'0');
    updatePills(data);
  });
}

function setMode(m){
  mode=m;
  if(m==='live'){
    document.getElementById('btn-live').className='mode-btn active';
    document.getElementById('btn-hist').className='mode-btn';
    document.getElementById('hist-controls').className='hist-controls';
    document.getElementById('hist-info').className='hist-info';
    document.getElementById('status-mode').textContent='Modo: Tempo Real';
    clearHistory();liveRefresh();
    if(!refreshTimer)refreshTimer=setInterval(liveRefresh,60000);
  }else{
    document.getElementById('btn-live').className='mode-btn';
    document.getElementById('btn-hist').className='mode-btn active';
    document.getElementById('hist-controls').className='hist-controls show';
    document.getElementById('status-mode').textContent='Modo: Historico de Rota';
    if(refreshTimer){clearInterval(refreshTimer);refreshTimer=null;}
  }
}

function selectVehicleForHistory(veh){
  selectedVehicle=veh;
  document.getElementById('hist-vehicle-name').textContent=veh.name;
  document.getElementById('hist-vehicle-name').style.color=veh.color;
  document.querySelectorAll('.pill').forEach(function(p,i){
    if(VEHICLES[i]&&VEHICLES[i].id===veh.id){if(p.className.indexOf('selected')<0)p.className+=' selected';}
    else p.className=p.className.replace(' selected','');
  });
}

function loadHistory(){
  if(!selectedVehicle){alert('Selecione um veiculo clicando na plaquinha acima ou no marcador no mapa');return;}
  var dateVal=document.getElementById('hist-date').value;
  if(!dateVal){alert('Selecione uma data');return;}
  var token=getToken();
  if(!token){document.getElementById('warn-bar').style.display='flex';alert('Conecte ao Fulltrack primeiro (barra amarela acima)');return;}
  var parts=dateVal.split('-');
  var di=parts[2]+'/'+parts[1]+'/'+parts[0]+' 00:00:00';
  var df=parts[2]+'/'+parts[1]+'/'+parts[0]+' 23:59:59';
  document.getElementById('loading').className='loading-overlay show';
  clearHistory();
  var body=JSON.stringify({id_cliente:CLIENT_ID,id_ativo:String(selectedVehicle.id),timezone:'America/Sao_Paulo',dt_inicial:di,dt_final:df,idioma:'pt-BR',limit:2000,offset:0});
  var xhr=new XMLHttpRequest();
  xhr.open('POST',API_HIST,true);
  xhr.setRequestHeader('Content-Type','application/json');
  xhr.setRequestHeader('Authorization','Bearer '+token);
  xhr.onload=function(){
    document.getElementById('loading').className='loading-overlay';
    if(xhr.status===200){try{drawRoute(JSON.parse(xhr.responseText).rows||[],selectedVehicle,dateVal);}catch(e){alert('Erro ao processar');}}
    else if(xhr.status===401){localStorage.removeItem(TOK_KEY);document.getElementById('warn-bar').style.display='flex';alert('Token expirado. Reconecte ao Fulltrack.');}
    else alert('Erro: '+xhr.status);
  };
  xhr.onerror=function(){document.getElementById('loading').className='loading-overlay';alert('Erro de conexao');};
  xhr.send(body);
}

function drawRoute(rows,veh,dateVal){
  if(!rows||!rows.length){document.getElementById('hist-stats').textContent='Sem dados para esta data.';document.getElementById('hist-info').className='hist-info show';return;}
  var coords=rows.map(function(r){return r.lst_localizacao;}).filter(function(c){return c&&c.length===2;});
  if(!coords.length){alert('Sem coordenadas');return;}
  histLayer=L.layerGroup().addTo(map);
  var ll=coords.map(function(c){return[c[0],c[1]];});
  var poly=L.polyline(ll,{color:veh.color,weight:4,opacity:0.8}).addTo(histLayer);
  L.circleMarker(ll[ll.length-1],{radius:8,color:'#22c55e',fillColor:'#22c55e',fillOpacity:1}).addTo(histLayer).bindPopup('<b>Inicio</b><br>'+rows[rows.length-1].dt_gps);
  L.circleMarker(ll[0],{radius:8,color:'#ef4444',fillColor:'#ef4444',fillOpacity:1}).addTo(histLayer).bindPopup('<b>Fim</b><br>'+rows[0].dt_gps);
  map.fitBounds(poly.getBounds(),{padding:[30,30]});
  var dist=rows[0].vl_hodometro||0;
  document.getElementById('hist-stats').textContent=veh.name+' | '+dateVal+' | '+coords.length+' pontos | ~'+dist.toFixed(1)+' km';
  document.getElementById('hist-info').className='hist-info show';
  document.getElementById('status-time').textContent='Historico: '+coords.length+' pontos';
}

function clearHistory(){
  if(histLayer){map.removeLayer(histLayer);histLayer=null;}
  document.getElementById('hist-info').className='hist-info';
}

var tod=new Date();
document.getElementById('hist-date').value=tod.getFullYear()+'-'+String(tod.getMonth()+1).padStart(2,'0')+'-'+String(tod.getDate()).padStart(2,'0');

liveRefresh();
refreshTimer=setInterval(liveRefresh,60000);
</script>
</body>
</html>
