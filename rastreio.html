<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rastreio de Frota - Formato</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:"Segoe UI",sans-serif;background:#0f172a;color:#e2e8f0;height:100vh;display:flex;flex-direction:column;}
    .hdr{background:linear-gradient(135deg,#1e3a5f,#1e293b);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #334155;}
    .hdr h1{font-size:1.1rem;font-weight:700;color:#60a5fa;}
    .hdr a{color:#94a3b8;font-size:0.8rem;text-decoration:none;padding:5px 12px;border:1px solid #334155;border-radius:6px;}
    .hdr a:hover{color:#60a5fa;border-color:#60a5fa;}
    .bar{background:#1e293b;padding:8px 20px;display:flex;align-items:center;gap:12px;font-size:0.75rem;border-bottom:1px solid #334155;flex-wrap:wrap;}
    .pill{display:inline-flex;align-items:center;gap:6px;background:#0f172a;border:1px solid #334155;border-radius:20px;padding:4px 12px;font-size:0.72rem;font-weight:600;cursor:pointer;transition:.15s;}
    .pill:hover{border-color:#3b82f6;color:#60a5fa;}
    .pill.on{border-color:#22c55e;color:#22c55e;}
    .pill.mov{border-color:#3b82f6;color:#60a5fa;}
    .dot{width:7px;height:7px;border-radius:50%;background:#475569;flex-shrink:0;}
    .dot.on{background:#22c55e;animation:blink 1.2s ease-in-out infinite;}
    .dot.mov{background:#3b82f6;animation:blink 0.6s ease-in-out infinite;}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
    #map{flex:1;}
    .upd{font-size:.72rem;color:#475569;margin-left:auto;}
    .leaflet-popup-content-wrapper{background:#1e293b;color:#e2e8f0;border:1px solid #334155;border-radius:10px;}
    .leaflet-popup-tip{background:#1e293b;}
  </style>
</head>
<body>
<div class="hdr">
  <h1>Rastreio de Frota</h1>
  <a href="index.html">&#x2190; Voltar</a>
</div>
<div class="bar" id="bar"><span>Carregando...</span></div>
<div id="map"></div>
<script>
var VEICULOS = [
  {nome:"SAVEIRO 1",placa:"QSS4B37",lat:-21.556244,lng:-49.854107,ign:0,vel:0},
  {nome:"VAN",placa:"FORMATO",lat:-21.536713,lng:-49.859706,ign:0,vel:0},
  {nome:"UNO",placa:"ENM7C89",lat:-21.554644,lng:-49.857684,ign:0,vel:0},
  {nome:"Opala",placa:"Opala",lat:-21.556393,lng:-49.855493,ign:0,vel:0}
];
var map = L.map('map').setView([-21.552,-49.857],14);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'&copy; OpenStreetMap'}).addTo(map);
var markers={};
function cor(v){return v.vel>0?'#3b82f6':v.ign?'#22c55e':'#64748b';}
function st(v){return v.vel>0?'mov':v.ign?'on':'';}
function mkIcon(v){
  var c=cor(v);
  var h='<div style="background:'+c+';border:3px solid #fff;border-radius:50% 50% 50% 0;transform:rotate(-45deg);width:36px;height:36px;display:flex;align-items:center;justify-content:center;"><span style="transform:rotate(45deg);font-size:11px;font-weight:900;color:#fff;">'+v.nome.substring(0,3)+'</span></div>';
  return L.divIcon({html:h,className:'',iconSize:[36,36],iconAnchor:[18,36],popupAnchor:[0,-40]});
}
function mkPopup(v){
  return '<b style="color:#60a5fa">'+v.nome+'</b>'+
         '<br><small>Placa: <b>'+v.placa+'</b></small>'+
         '<br><small>Ignicao: <b>'+(v.ign?'Ligada':'Desligada')+'</b></small>'+
         '<br><small>Velocidade: <b>'+(v.vel>0?v.vel+' km/h':'Parado')+'</b></small>';
}
function render(){
  var bounds=[];
  for(var i=0;i<VEICULOS.length;i++){
    var v=VEICULOS[i];
    var ic=mkIcon(v);
    if(markers[v.nome]){
      markers[v.nome].setLatLng([v.lat,v.lng]).setIcon(ic).setPopupContent(mkPopup(v));
    }else{
      markers[v.nome]=L.marker([v.lat,v.lng],{icon:ic}).bindPopup(mkPopup(v),{maxWidth:220}).addTo(map);
    }
    bounds.push([v.lat,v.lng]);
  }
  if(bounds.length>0)map.fitBounds(bounds,{padding:[50,50]});
}
function renderBar(){
  var now=new Date().toLocaleTimeString('pt-BR');
  var html='';
  for(var i=0;i<VEICULOS.length;i++){
    var v=VEICULOS[i];var sc=st(v);
    html+='<div class="pill '+sc+'" onclick="fv(\'' + v.nome + '\')"><div class="dot '+sc+'"></div>'+v.nome+'</div>';
  }
  html+='<span class="upd">Atualizado: '+now+'</span>';
  document.getElementById('bar').innerHTML=html;
}
function fv(nome){
  for(var i=0;i<VEICULOS.length;i++){
    if(VEICULOS[i].nome===nome){map.setView([VEICULOS[i].lat,VEICULOS[i].lng],16);if(markers[nome])markers[nome].openPopup();break;}
  }
}
function buscar(){
  var xhr=new XMLHttpRequest();
  xhr.withCredentials=true;
  xhr.open('POST','https://vitoria-acessorios.fulltrackapp.com/mapaGeral/buscarRegistrosRastreadosDefinidos',true);
  xhr.setRequestHeader('Content-Type','application/x-www-form-urlencoded');
  xhr.setRequestHeader('Accept','application/json');
  xhr.setRequestHeader('X-Requested-With','XMLHttpRequest');
  xhr.onload=function(){
    try{
      var data=JSON.parse(xhr.responseText);
      var regs=(data.registros||{})['296743']||{};
      var keys=Object.keys(regs);
      for(var k=0;k<keys.length;k++){
        var r=regs[keys[k]];
        var p=r.ras_veiculos&&r.ras_veiculos.ras_vei_placa;
        for(var j=0;j<VEICULOS.length;j++){
          if(VEICULOS[j].placa===p){VEICULOS[j].lat=r.loc[0];VEICULOS[j].lng=r.loc[1];VEICULOS[j].ign=r.ras_eve_ignicao;VEICULOS[j].vel=r.ras_eve_velocidade;}
        }
      }
    }catch(e){}
    render();renderBar();
  };
  xhr.onerror=function(){render();renderBar();};
  xhr.send('cliente=296743');
}
buscar();
setInterval(buscar,60000);
</script>
</body>
</html>
